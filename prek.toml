# Configuration file for `prek`, a git hook framework written in Rust.
# See https://prek.j178.dev for more information.
#:schema https://www.schemastore.org/prek.json

minimum_prek_version = "0.3.0"
default_stages = ["pre-commit"]

[[repos]]
repo = "https://github.com/pre-commit/pre-commit-hooks"
rev = "v6.0.0"
hooks = [
  { id = "trailing-whitespace", exclude = '\.md$' },
  { id = "end-of-file-fixer" },
  { id = "check-yaml" },
  { id = "check-toml" },
  { id = "check-merge-conflict" },
  { id = "check-added-large-files", args = ["--maxkb=1024"] },
]

[[repos]]
repo = "https://github.com/astral-sh/ruff-pre-commit"
rev = "v0.15.8"
hooks = [
  { id = "ruff-check", args = ["--fix"], types_or = ["python", "pyi", "pyproject"] },
  { id = "ruff-format", types_or = ["python", "pyi"] },
]

# Markdown formatting
[[repos]]
repo = "https://github.com/hukkin/mdformat"
rev = "1.0.0"
hooks = [
  {
    id = "mdformat",
    additional_dependencies = ["mdformat-gfm", "mdformat-frontmatter"]
  }
]

# Markdown linting
[[repos]]
repo = "https://github.com/DavidAnson/markdownlint-cli2"
rev = "v0.22.0"
hooks = [{ id = "markdownlint-cli2" }]

# Shell script linting
[[repos]]
repo = "https://github.com/shellcheck-py/shellcheck-py"
rev = "v0.11.0.1"
hooks = [
  {
    id = "shellcheck",
    files = '\.(sh|bash)$',
    args = ["--severity=warning"]
  }
]

# Shell script formatting
[[repos]]
repo = "https://github.com/maxwinterstein/shfmt-py"
rev = "v3.12.0.1"
hooks = [
  {
    id = "shfmt",
    files = '\.(sh|bash)$',
    args = ["-i", "2", "-l", "-w", "-s"]
  }
]

# Commit message linting
[[repos]]
repo = "https://github.com/alessandrojcm/commitlint-pre-commit-hook"
rev = "v9.24.0"
hooks = [
  {
    id = "commitlint",
    stages = ["commit-msg"],
    additional_dependencies = [
      "@commitlint/cli",
      "@commitlint/config-conventional"
    ]
  }
]
